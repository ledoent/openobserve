name: Sync main from upstream

# Keeps `ledoent/openobserve:main` a strict mirror of
# `openobserve/openobserve:main`. Matches the ledoent/fleet pattern.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/openobserve/openobserve.git

      - name: Fetch upstream
        run: git fetch upstream main --tags

      - name: Paranoia — refuse if main has non-bot commits
        run: |
          AUTHORS=$(git log upstream/main..origin/main --format='%ae' | sort -u || true)
          NON_BOT=$(echo "$AUTHORS" | grep -v -E '(github-actions\[bot\]@users\.noreply\.github\.com|^$)' || true)
          if [ -n "$NON_BOT" ]; then
            echo "::error::main has non-bot commits not on upstream. Refusing to force-push."
            echo "Offending authors:"
            echo "$NON_BOT"
            exit 1
          fi

      - name: Force main to upstream
        run: git push origin +refs/remotes/upstream/main:refs/heads/main
