name: ledoent build (review image)

# Builds linux/amd64 image and pushes to GAR
# (europe-west3-docker.pkg.dev/kendall-ledo/docker/openobserve/openobserve).
# Auth via Workload Identity Federation — no stored secrets.
#
# Strategy mirrors upstream build-pr-image.yml: compile Rust on the runner
# (using Swatinem/rust-cache for iteration speed), build the frontend with
# Node, then assemble a thin Dockerfile.pr image that just COPYs the binary.
# Runs on ubicloud-standard-8 (native amd64, 8 vCPU / 32 GB) — ubuntu-latest
# (16 GB) could not link the final openobserve binary.
#
# Consumed by ledoent/infra deployments/openobserve/values-ledoweb.yaml for
# the observe-review.ledoweb.com side-by-side review deployment. Prod is
# untouched.

on:
  push:
    branches: [build/deploy]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: false
        type: string
        default: build/deploy
      tag:
        description: 'Image tag (default: v0.70.0-mobile-<shortsha>)'
        required: false
        type: string

concurrency:
  group: ledoent-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_HOST: europe-west3-docker.pkg.dev
  GAR_IMAGE: europe-west3-docker.pkg.dev/kendall-ledo/docker/openobserve/openobserve

jobs:
  build:
    runs-on: ubicloud-standard-8
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1

      - id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.70.0-mobile-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-11-11
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: ledoent-amd64

      - name: Install Protoc
        run: bash ./.github/protoc.sh

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build frontend
        run: cd web && npm ci && NODE_OPTIONS="--max-old-space-size=8192" npm run build

      - name: Build binary
        run: |
          # Plain --release (no LTO, codegen-units=16, strip=true). Slightly
          # slower runtime than release-prod but fine for a review build and
          # keeps link-time memory well under the 32 GB Ubicloud ceiling.
          cargo build --features mimalloc --release --target x86_64-unknown-linux-gnu
          mkdir -p bin
          mv target/x86_64-unknown-linux-gnu/release/openobserve bin/openobserve
          ls -lh bin/openobserve
          free -h
          df -h

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/852639431500/locations/global/workloadIdentityPools/github/providers/ledoent
          service_account: ci-github@kendall-ledo.iam.gserviceaccount.com
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/build/Dockerfile.pr
          platforms: linux/amd64
          push: true
          tags: ${{ env.GAR_IMAGE }}:${{ steps.meta.outputs.tag }}

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo ''
            echo '```'
            echo "${{ env.GAR_IMAGE }}:${{ steps.meta.outputs.tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
