name: ledoent build (review image)

# Builds linux/amd64 image from deploy/build/Dockerfile.tag.amd64 and pushes to
# GAR (europe-west3-docker.pkg.dev/kendall-ledo/docker/openobserve/openobserve).
# Auth via Workload Identity Federation — no stored secrets.
#
# Consumed by ledoent/infra (deployments/openobserve/values-ledoweb.yaml) for
# the observe-review.ledoweb.com side-by-side review deployment. Prod is
# untouched.

on:
  push:
    branches: [build/deploy]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: false
        type: string
        default: build/deploy
      tag:
        description: 'Image tag (default: v0.70.0-mobile-<shortsha>)'
        required: false
        type: string

concurrency:
  group: ledoent-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_HOST: europe-west3-docker.pkg.dev
  GAR_IMAGE: europe-west3-docker.pkg.dev/kendall-ledo/docker/openobserve/openobserve

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1

      - id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.70.0-mobile-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/852639431500/locations/global/workloadIdentityPools/github/providers/ledoent
          service_account: ci-github@kendall-ledo.iam.gserviceaccount.com
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/build/Dockerfile.tag.amd64
          platforms: linux/amd64
          push: true
          tags: ${{ env.GAR_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.GAR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GAR_IMAGE }}:buildcache,mode=max

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo ''
            echo '```'
            echo "${{ env.GAR_IMAGE }}:${{ steps.meta.outputs.tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
